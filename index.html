<!DOCTYPE html>
<html>

<head>
  <title>Recipe Journal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>My Recipe Journal</h1>

  <h2>Add a Recipe</h2>

  <input id="title" placeholder="Recipe name">

  <br><br>

  <textarea id="ingredients" placeholder="Ingredients"></textarea>

  <br><br>

  <textarea id="instructions" placeholder="Instructions"></textarea>

  <br><br>

  <button onclick="addRecipe()">Save Recipe</button>

  <h2>Saved Recipes</h2>

  <div id="recipes"></div>

  <script src="script.js"></script>

</body>

</html>
